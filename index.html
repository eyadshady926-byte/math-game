<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Battle PRO MAX</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  color: white;
}

#gameBox {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  margin: auto;
}

button {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
  background: orange;
  border: none;
  color: white;
}

#shop, #resultScreen {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#countdown { font-size: 40px; color: yellow; }
</style>
</head>

<body>

<h1>⚔️ Math Battle ⚔️</h1>

<div id="gameBox">
  <p id="status">Waiting...</p>
  <button onclick="readyUp()">I'm Ready</button>

  <p id="countdown"></p>
  <p>⏱ <span id="time">--</span></p>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <p>👤 <span id="playerName"></span></p>
  <p>⭐ Score: <span id="score">0</span></p>
  <p>⚔️ Opponent: <span id="enemyScore">0</span></p>

  <p>💎 Coins: <span id="coins">0</span></p>
  <button onclick="openShop()">🛒 Shop</button>

  <div id="leaderboard"></div>
</div>

<div id="shop">
  <h2>Shop</h2>
  <button onclick="buyHint()">💡 Hint (5)</button>
  <button onclick="buyTime()">⏱ +5s (10)</button>
  <button onclick="closeShop()">Close</button>
</div>

<div id="resultScreen"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAS6XF3rU6DwVtQMBN-MbUI3TLvSbcs0",
  authDomain: "math-game-multiplayer.firebaseapp.com",
  projectId: "math-game-multiplayer"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👤 USER
let name = prompt("Enter your username:");
document.getElementById("playerName").innerText = name;

const playerRef = doc(db, "players", name);

// 💎 COINS
let coins = 0;

async function loadPlayer() {
  const snap = await getDoc(playerRef);
  if (snap.exists()) coins = snap.data().coins || 0;
  else await setDoc(playerRef, { coins: 0 });
  updateCoins();
}

async function savePlayer() {
  await updateDoc(playerRef, { coins: coins });
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

loadPlayer();

// 🎮 MULTIPLAYER
let roomId = prompt("Room ID:");
let player = prompt("Player 1 or 2:");
let gameTime = parseInt(prompt("Game time:")) || 30;

const roomRef = doc(db, "rooms", roomId);

async function initRoom() {
  const snap = await getDoc(roomRef);
  if (!snap.exists()) {
    await setDoc(roomRef, {
      player1: 0,
      player2: 0,
      ready1: false,
      ready2: false,
      startTime: null,
      duration: gameTime
    });
  }
}
initRoom();

// READY
window.readyUp = async function() {
  if (player === "1") {
    await updateDoc(roomRef, { ready1: true, duration: gameTime });
  } else {
    await updateDoc(roomRef, { ready2: true });
  }
};

// SYNC
let score = 0;
let enemyScore = 0;
let started = false;
let startTriggered = false;

onSnapshot(roomRef, async (snap) => {
  const data = snap.data();
  if (!data) return;

  enemyScore = player === "1" ? data.player2 : data.player1;
  document.getElementById("enemyScore").innerText = enemyScore;

  if (data.ready1 && data.ready2 && !data.startTime && !startTriggered) {
    startTriggered = true;
    await updateDoc(roomRef, { startTime: Date.now() + 3000 });
  }

  if (data.startTime && !started) {
    started = true;
    startCountdown(data.startTime, data.duration);
  }
});

// COUNTDOWN
function startCountdown(startTime, duration) {
  let el = document.getElementById("countdown");

  let interval = setInterval(() => {
    let remaining = Math.ceil((startTime - Date.now()) / 1000);

    if (remaining > 0) el.innerText = remaining;
    else {
      el.innerText = "GO!";
      clearInterval(interval);
      setTimeout(() => {
        el.innerText = "";
        startGame(startTime, duration);
      }, 500);
    }
  }, 100);
}

// GAME
let correct;

function newQ() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  correct = a + b;

  let options = [correct, correct+1, correct-1].sort(()=>Math.random()-0.5);

  document.getElementById("question").innerText = a + " + " + b;
  document.getElementById("answers").innerHTML =
    options.map(x => `<button onclick="ans(${x})">${x}</button>`).join("");
}

window.ans = function(x) {
  if (x === correct) {
    score++;
    coins += 2;
    savePlayer();
    updateCoins();
  }

  document.getElementById("score").innerText = score;

  if (player === "1") updateDoc(roomRef, { player1: score });
  else updateDoc(roomRef, { player2: score });

  newQ();
};

// TIMER
let startTimeGlobal = 0;

function startGame(startTime, durationSec) {
  startTimeGlobal = startTime;
  const duration = durationSec * 1000;

  let timer = setInterval(() => {
    let remaining = Math.ceil((duration - (Date.now() - startTimeGlobal)) / 1000);
    if (remaining < 0) remaining = 0;

    document.getElementById("time").innerText = remaining;

    if (remaining <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 100);

  newQ();
}

// 🛒 SHOP
window.openShop = () => document.getElementById("shop").style.display = "flex";
window.closeShop = () => document.getElementById("shop").style.display = "none";

window.buyHint = function() {
  if (coins < 5) return alert("Not enough coins");
  coins -= 5; updateCoins();

  let btns = document.querySelectorAll("#answers button");
  btns.forEach(btn => {
    if (parseInt(btn.innerText) !== correct) btn.style.display = "none";
  });
};

window.buyTime = function() {
  if (coins < 10) return alert("Not enough coins");
  coins -= 10; updateCoins();
  startTimeGlobal += 5000;
};

// 🏆 END GAME
async function endGame() {
  await addDoc(collection(db, "leaderboard"), {
    name: name,
    score: score
  });

  loadLeaderboard();

  let result = score > enemyScore ? "YOU WIN 🏆" :
               score < enemyScore ? "YOU LOSE ❌" : "DRAW";

  let screen = document.getElementById("resultScreen");
  screen.style.display = "flex";
  screen.innerHTML = `
    <h1>${result}</h1>
    <p>You: ${score}</p>
    <p>Opponent: ${enemyScore}</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}

// LEADERBOARD
async function loadLeaderboard() {
  const snap = await getDocs(collection(db, "leaderboard"));

  let list = [];
  snap.forEach(doc => list.push(doc.data()));

  list.sort((a,b)=> b.score - a.score);

  let html = "<h3>Top Players</h3>";
  list.slice(0,5).forEach(p => {
    html += `<p>${p.name}: ${p.score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

</script>

</body>
</html>
