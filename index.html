<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Game INSANE Multiplayer</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

h1 {
  font-size: 40px;
}

#gameBox {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  margin: auto;
}

button {
  padding: 15px;
  margin: 10px;
  font-size: 20px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
  background: orange;
  color: white;
}
</style>
</head>

<body>

<h1>🔥 Math Game INSANE 🔥</h1>

<div id="gameBox">
  <h2 id="question">Loading...</h2>
  <div id="answers"></div>

  <p>⭐ Score: <span id="score">0</span></p>
  <p>⚔️ Opponent: <span id="enemyScore">0</span></p>
  <p>❤️ Lives: <span id="lives">3</span></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAS6XF3rU6DwVtQMBN-MbUI3TLvSbcs0",
  authDomain: "math-game-multiplayer.firebaseapp.com",
  projectId: "math-game-multiplayer",
  storageBucket: "math-game-multiplayer.appspot.com",
  messagingSenderId: "514610027990",
  appId: "1:514610027990:web:410c743e03304e2b405877"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Multiplayer setup
let roomId = prompt("Enter Room ID (same as your friend):");
let player = prompt("Type 1 or 2");

const roomRef = doc(db, "rooms", roomId);

// Create room if not exist
async function initRoom() {
  const snap = await getDoc(roomRef);
  if (!snap.exists()) {
    await setDoc(roomRef, {
      player1: 0,
      player2: 0
    });
  }
}
initRoom();

// Update your score
async function updateOnlineScore(score) {
  if (player === "1") {
    await updateDoc(roomRef, { player1: score });
  } else {
    await updateDoc(roomRef, { player2: score });
  }
}

// Listen to opponent score
onSnapshot(roomRef, (snap) => {
  const data = snap.data();
  if (!data) return;

  if (player === "1") {
    document.getElementById("enemyScore").innerText = data.player2;
  } else {
    document.getElementById("enemyScore").innerText = data.player1;
  }
});

// Game logic
let score = 0;
let lives = 3;
let correctAnswer;

function newQuestion() {
  let a = Math.floor(Math.random() * 10);
  let b = Math.floor(Math.random() * 10);

  correctAnswer = a + b;
  document.getElementById("question").innerText = `${a} + ${b}`;

  let answers = [
    correctAnswer,
    correctAnswer + 1,
    correctAnswer - 1
  ];

  answers.sort(() => Math.random() - 0.5);

  let html = "";
  answers.forEach(ans => {
    html += `<button onclick="checkAnswer(${ans})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
}

window.checkAnswer = function(answer) {
  if (answer === correctAnswer) {
    score++;
    document.getElementById("score").innerText = score;
    updateOnlineScore(score);
  } else {
    lives--;
    document.getElementById("lives").innerText = lives;
  }

  if (lives <= 0) {
    alert("Game Over!");
    location.reload();
  }

  newQuestion();
};

// Start
newQuestion();

</script>

</body>
</html>
