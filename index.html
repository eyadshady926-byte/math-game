<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Math Game INSANE - Fast Math Challenge</title>

    <!-- SEO -->
    <meta name="description" content="Play a fast-paced math game online. Answer quickly before time runs out and beat your high score!">
    <meta name="keywords" content="math game, online game, brain game, quick math, quiz game">
    <meta name="author" content="Eyad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Social -->
    <meta property="og:title" content="🔥 Math Game INSANE">
    <meta property="og:description" content="Test your speed and beat your high score!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eyadshady926-byte.github.io/math-game">

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        h1 {
            font-size: 40px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 20px #00ffff; }
        }

        #gameBox {
            margin: auto;
            margin-top: 30px;
            padding: 20px;
            width: 300px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        button {
            padding: 15px;
            margin: 10px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: orange;
            color: white;
        }

        button:hover {
            background: red;
        }

        #timerBar {
            height: 10px;
            background: lime;
            margin: 10px;
        }
    </style>
</head>

<body>

<h1>🔥 Math Game INSANE 🔥</h1>

<div id="gameBox">
    <p id="question">Loading...</p>
    <div id="timerBar"></div>

    <button onclick="checkAnswer(0)" id="b0"></button>
    <button onclick="checkAnswer(1)" id="b1"></button>
    <button onclick="checkAnswer(2)" id="b2"></button>

    <p>⭐ Score: <span id="score">0</span></p>
    <p>❤️ Lives: <span id="lives">3</span></p>
    <p>🏆 High Score: <span id="high">0</span></p>
    <p>🔥 Combo: <span id="combo">0</span></p>

    <button onclick="restart()">Restart</button>
</div>

<script>
let score = 0;
let lives = 3;
let combo = 0;
let correct = 0;
let timeLeft = 100;
let timer;

let highScore = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = highScore;

function newQuestion() {
    clearInterval(timer);
    timeLeft = 100;

    let a = Math.floor(Math.random() * 20);
    let b = Math.floor(Math.random() * 20);
    correct = a + b;

    document.getElementById("question").innerText = a + " + " + b;

    let answers = [correct, correct + 2, correct - 1];
    answers.sort(() => Math.random() - 0.5);

    for (let i = 0; i < 3; i++) {
        document.getElementById("b" + i).innerText = answers[i];
        document.getElementById("b" + i).value = answers[i];
    }

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timerBar").style.width = timeLeft + "%";

        if (timeLeft <= 0) {
            loseLife();
        }
    }, 50);
}

function checkAnswer(i) {
    let val = document.getElementById("b" + i).value;

    if (val == correct) {
        score++;
        combo++;
    } else {
        loseLife();
        return;
    }

    update();
    newQuestion();
}

function loseLife() {
    lives--;
    combo = 0;

    if (lives <= 0) {
        alert("Game Over!");
        if (score > highScore) {
            localStorage.setItem("high", score);
        }
        restart();
        return;
    }

    update();
    newQuestion();
}

function update() {
    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
    document.getElementById("combo").innerText = combo;
    document.getElementById("high").innerText = localStorage.getItem("high");
}

function restart() {
    score = 0;
    lives = 3;
    combo = 0;
    update();
    newQuestion();
}

newQuestion();
</script>

</body>
</html>
