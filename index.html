<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Battle FINAL</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #1e3c72;
  color: white;
}

#gameBox {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  margin: auto;
}

button {
  padding: 12px;
  margin: 8px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: orange;
}

#countdown {
  font-size: 40px;
  color: yellow;
}
</style>
</head>

<body>

<h1>⚔️ Math Battle ⚔️</h1>

<div id="gameBox">
  <p id="status">Waiting...</p>
  <button onclick="readyUp()">I'm Ready</button>

  <p id="countdown"></p>
  <p>⏱ Time: <span id="time">--</span></p>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <p>⭐ You: <span id="score">0</span></p>
  <p>⚔️ Opponent: <span id="enemyScore">0</span></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAS6XF3rU6DwVtQMBN-MbUI3TLvSbcs0",
  authDomain: "math-game-multiplayer.firebaseapp.com",
  projectId: "math-game-multiplayer",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SETUP
let roomId = prompt("Room ID:");
let player = prompt("Player 1 or 2:");
let gameTime = parseInt(prompt("Game time in seconds (Player 1 sets):")) || 30;

const roomRef = doc(db, "rooms", roomId);

// CREATE ROOM
async function initRoom() {
  const snap = await getDoc(roomRef);
  if (!snap.exists()) {
    await setDoc(roomRef, {
      player1: 0,
      player2: 0,
      ready1: false,
      ready2: false,
      startTime: null,
      duration: gameTime
    });
  }
}
initRoom();

// READY BUTTON
window.readyUp = async function() {
  document.getElementById("status").innerText = "You are ready ✅";

  if (player === "1") {
    await updateDoc(roomRef, {
      ready1: true,
      duration: gameTime
    });
  } else {
    await updateDoc(roomRef, {
      ready2: true
    });
  }
};

let score = 0;
let enemyScore = 0;
let started = false;
let startTriggered = false;

// SYNC
onSnapshot(roomRef, async (snap) => {
  const data = snap.data();
  if (!data) return;

  enemyScore = player === "1" ? data.player2 : data.player1;
  document.getElementById("enemyScore").innerText = enemyScore;

  document.getElementById("status").innerText =
    `Ready: ${data.ready1 ? "P1✅" : "P1❌"} | ${data.ready2 ? "P2✅" : "P2❌"}`;

  // FIX: delay start time for countdown
  if (data.ready1 && data.ready2 && !data.startTime && !startTriggered) {
    startTriggered = true;
    const delay = 3000; // 3 sec countdown
    await updateDoc(roomRef, {
      startTime: Date.now() + delay
    });
  }

  if (data.startTime && !started) {
    started = true;
    startCountdown(data.startTime, data.duration);
  }
});

// COUNTDOWN (SYNCED)
function startCountdown(startTime, duration) {
  let el = document.getElementById("countdown");

  let interval = setInterval(() => {
    let now = Date.now();
    let remaining = Math.ceil((startTime - now) / 1000);

    if (remaining > 0) {
      el.innerText = remaining;
    } else {
      el.innerText = "GO!";
      clearInterval(interval);

      setTimeout(() => {
        el.innerText = "";
        startGame(startTime, duration);
      }, 500);
    }
  }, 100);
}

// GAME
let correct;

function newQ() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  correct = a + b;

  document.getElementById("question").innerText = a + " + " + b;

  let options = [correct, correct+1, correct-1].sort(()=>Math.random()-0.5);

  document.getElementById("answers").innerHTML =
    options.map(x => `<button onclick="ans(${x})">${x}</button>`).join("");
}

window.ans = function(x) {
  if (x === correct) {
    score++;
    document.getElementById("score").innerText = score;

    if (player === "1") {
      updateDoc(roomRef, { player1: score });
    } else {
      updateDoc(roomRef, { player2: score });
    }
  }
  newQ();
};

// TIMER (FIXED)
function startGame(startTime, durationSec) {
  const duration = durationSec * 1000;

  let timer = setInterval(() => {
    let now = Date.now();
    let remaining = Math.ceil((duration - (now - startTime)) / 1000);

    if (remaining < 0) remaining = 0;

    document.getElementById("time").innerText = remaining;

    if (remaining <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 100);

  newQ();
}

// END
function endGame() {
  let result = "DRAW";

  if (score > enemyScore) result = "YOU WIN 🏆";
  else if (score < enemyScore) result = "YOU LOSE ❌";

  alert(`Game Over\nYou: ${score}\nOpponent: ${enemyScore}\n${result}`);
}
</script>

</body>
</html>
