<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Battle INSANE</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  color: white;
}

#gameBox {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  margin: auto;
  box-shadow: 0 0 20px cyan;
}

button {
  padding: 12px;
  margin: 6px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: orange;
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
}

.correct { background: lime !important; }
.wrong { background: red !important; }

#countdown {
  font-size: 50px;
  color: yellow;
}

#resultScreen {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:30px;
}
</style>
</head>

<body>

<h1>⚔️ Math Battle ⚔️</h1>

<div id="gameBox">
  <p id="status">Waiting...</p>
  <button onclick="readyUp()">I'm Ready</button>

  <p id="countdown"></p>
  <p>⏱ <span id="time">--</span></p>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <p>👤 You: <span id="playerName"></span></p>
  <p>⭐ Score: <span id="score">0</span></p>
  <p>⚔️ Opponent: <span id="enemyScore">0</span></p>
</div>

<div id="resultScreen"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAS6XF3rU6DwVtQMBN-MbUI3TLvSbcs0",
  authDomain: "math-game-multiplayer.firebaseapp.com",
  projectId: "math-game-multiplayer",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔊 Sounds
const correctSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
const wrongSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-tone-2871.mp3");

// Setup
let roomId = prompt("Room ID:");
let player = prompt("Player 1 or 2:");
let name = prompt("Your name:");
let gameTime = parseInt(prompt("Game time (sec):")) || 30;

document.getElementById("playerName").innerText = name;

const roomRef = doc(db, "rooms", roomId);

// Create room
async function initRoom() {
  const snap = await getDoc(roomRef);
  if (!snap.exists()) {
    await setDoc(roomRef, {
      player1: 0,
      player2: 0,
      ready1: false,
      ready2: false,
      startTime: null,
      duration: gameTime
    });
  }
}
initRoom();

// Ready
window.readyUp = async function() {
  if (player === "1") {
    await updateDoc(roomRef, { ready1: true, duration: gameTime });
  } else {
    await updateDoc(roomRef, { ready2: true });
  }
};

let score = 0;
let enemyScore = 0;
let started = false;
let startTriggered = false;

onSnapshot(roomRef, async (snap) => {
  const data = snap.data();
  if (!data) return;

  enemyScore = player === "1" ? data.player2 : data.player1;
  document.getElementById("enemyScore").innerText = enemyScore;

  if (data.ready1 && data.ready2 && !data.startTime && !startTriggered) {
    startTriggered = true;
    await updateDoc(roomRef, {
      startTime: Date.now() + 3000
    });
  }

  if (data.startTime && !started) {
    started = true;
    startCountdown(data.startTime, data.duration);
  }
});

// Countdown
function startCountdown(startTime, duration) {
  let el = document.getElementById("countdown");

  let interval = setInterval(() => {
    let remaining = Math.ceil((startTime - Date.now()) / 1000);

    if (remaining > 0) {
      el.innerText = remaining;
    } else {
      el.innerText = "GO!";
      clearInterval(interval);
      setTimeout(() => {
        el.innerText = "";
        startGame(startTime, duration);
      }, 500);
    }
  }, 100);
}

// Game
let correct;

function newQ() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  correct = a + b;

  document.getElementById("question").innerText = a + " + " + b;

  let options = [correct, correct+1, correct-1].sort(()=>Math.random()-0.5);

  document.getElementById("answers").innerHTML =
    options.map(x => `<button onclick="ans(this, ${x})">${x}</button>`).join("");
}

window.ans = function(btn, x) {
  if (x === correct) {
    score++;
    btn.classList.add("correct");
    correctSound.play();
  } else {
    btn.classList.add("wrong");
    wrongSound.play();
  }

  document.getElementById("score").innerText = score;

  if (player === "1") {
    updateDoc(roomRef, { player1: score });
  } else {
    updateDoc(roomRef, { player2: score });
  }

  setTimeout(newQ, 300);
};

// Timer
function startGame(startTime, durationSec) {
  const duration = durationSec * 1000;

  let timer = setInterval(() => {
    let remaining = Math.ceil((duration - (Date.now() - startTime)) / 1000);

    if (remaining < 0) remaining = 0;
    document.getElementById("time").innerText = remaining;

    if (remaining <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 100);

  newQ();
}

// End screen
function endGame() {
  let result = "DRAW";

  if (score > enemyScore) result = "YOU WIN 🏆";
  else if (score < enemyScore) result = "YOU LOSE ❌";

  let screen = document.getElementById("resultScreen");
  screen.style.display = "flex";
  screen.innerHTML = `
    <h1>${result}</h1>
    <p>You: ${score}</p>
    <p>Opponent: ${enemyScore}</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}
</script>

</body>
</html>
