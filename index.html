<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Battle ONLINE</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #1e3c72;
  color: white;
}

#gameBox {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  margin: auto;
}

button {
  padding: 12px;
  margin: 8px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: orange;
}
</style>
</head>

<body>

<h1>⚔️ Math Battle ⚔️</h1>

<div id="gameBox">
  <p id="status">Waiting...</p>
  <button onclick="readyUp()">I'm Ready</button>

  <p>⏱ Time: <span id="time">--</span></p>
  <h2 id="question"></h2>
  <div id="answers"></div>

  <p>⭐ You: <span id="score">0</span></p>
  <p>⚔️ Opponent: <span id="enemyScore">0</span></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAS6XF3rU6DwVtQMBN-MbUI3TLvSbcs0",
  authDomain: "math-game-multiplayer.firebaseapp.com",
  projectId: "math-game-multiplayer",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Setup
let roomId = prompt("Room ID:");
let player = prompt("Player 1 or 2:");

const roomRef = doc(db, "rooms", roomId);

// Create room
async function initRoom() {
  const snap = await getDoc(roomRef);
  if (!snap.exists()) {
    await setDoc(roomRef, {
      player1: 0,
      player2: 0,
      ready1: false,
      ready2: false,
      startTime: null
    });
  }
}
initRoom();

// Ready system
window.readyUp = async function() {
  if (player === "1") {
    await updateDoc(roomRef, { ready1: true });
  } else {
    await updateDoc(roomRef, { ready2: true });
  }
};

// Sync listener
let score = 0;
let enemyScore = 0;
let started = false;

onSnapshot(roomRef, async (snap) => {
  const data = snap.data();
  if (!data) return;

  // opponent score
  enemyScore = player === "1" ? data.player2 : data.player1;
  document.getElementById("enemyScore").innerText = enemyScore;

  // start game when both ready
  if (data.ready1 && data.ready2 && !data.startTime) {
    await updateDoc(roomRef, { startTime: serverTimestamp() });
  }

  if (data.startTime && !started) {
    started = true;
    startGame(data.startTime.toMillis());
  }
});

// Game logic
let correct;

function newQ() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  correct = a + b;

  document.getElementById("question").innerText = a + " + " + b;

  let options = [correct, correct+1, correct-1].sort(()=>Math.random()-0.5);

  document.getElementById("answers").innerHTML =
    options.map(x => `<button onclick="ans(${x})">${x}</button>`).join("");
}

window.ans = function(x) {
  if (x === correct) {
    score++;
    document.getElementById("score").innerText = score;

    if (player === "1") {
      updateDoc(roomRef, { player1: score });
    } else {
      updateDoc(roomRef, { player2: score });
    }
  }
  newQ();
};

// PERFECT SYNC TIMER
function startGame(startTime) {
  document.getElementById("status").innerText = "GO!";

  const duration = 30000; // 30 sec

  let timer = setInterval(() => {
    let now = Date.now();
    let remaining = Math.ceil((duration - (now - startTime)) / 1000);

    if (remaining < 0) remaining = 0;

    document.getElementById("time").innerText = remaining;

    if (remaining <= 0) {
      clearInterval(timer);
      endGame();
    }
  }, 100);

  newQ();
}

// END GAME
function endGame() {
  let result = "DRAW";

  if (score > enemyScore) result = "YOU WIN 🏆";
  else if (score < enemyScore) result = "YOU LOSE ❌";

  alert(`Game Over\nYou: ${score}\nOpponent: ${enemyScore}\n${result}`);
}
</script>

</body>
</html>
